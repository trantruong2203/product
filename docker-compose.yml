version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: geo_saas_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: geo_saas
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    # Memory limit for VPS optimization
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M
    command: >
      postgres
      -c max_connections=50
      -c shared_buffers=64MB
      -c effective_cache_size=128MB
      -c work_mem=4MB
      -c maintenance_work_mem=32MB

  redis:
    image: redis:7-alpine
    container_name: geo_saas_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    # Memory limit for VPS optimization
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M
    command: redis-server --maxmemory 96mb --maxmemory-policy allkeys-lru

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: geo_saas_backend
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/geo_saas
      REDIS_URL: redis://redis:6379
      JWT_SECRET: your-super-secret-jwt-key-min-32-characters-long-12345
      JWT_EXPIRES_IN: 7d
      FRONTEND_URL: http://localhost:5173
      PORT: 3001
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend/src:/app/src
      - ./backend/test:/app/test
    # Memory limit for VPS optimization
    deploy:
      resources:
        limits:
          memory: 384M
        reservations:
          memory: 192M
    command: npm run dev

  worker:
    build:
      context: .
      dockerfile: worker/Dockerfile
    container_name: geo_saas_worker
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/geo_saas
      REDIS_URL: redis://redis:6379
      # VPS optimization settings
      WORKER_CONCURRENCY: "1"
      MAX_BROWSER_CONTEXTS: "1"
      MEMORY_THRESHOLD_MB: "1200"
      HEALTH_PORT: "8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./worker/src:/app/src
      - ./worker/test:/app/test
      - /app/node_modules
      - ./chrome-profile:/app/chrome-profile
    # Memory limit - critical for Playwright
    deploy:
      resources:
        limits:
          memory: 1200M
        reservations:
          memory: 600M
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    command: npm run dev

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: geo_saas_frontend
    environment:
      VITE_API_URL: http://localhost:3001
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    # Memory limit for VPS optimization
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M
    command: npm run dev

volumes:
  postgres_data:
  redis_data:

networks:
  default:
    name: geo_saas_network
