services:
  postgres:
    image: postgres:15-alpine
    container_name: geo-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-geo_saas}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-postgres} -d $${POSTGRES_DB:-geo_saas}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: geo-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  migrate:
    build:
      context: .
      dockerfile: ./backend/Dockerfile
    container_name: geo-migrate
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-geo_saas}?schema=public
    depends_on:
      postgres:
        condition: service_healthy
    command: sh -c "npm run migrate"
    restart: "no"

  migrate:
    build:
      context: .
      dockerfile: ./backend/Dockerfile
    container_name: geo-migrate
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/geo_saas
    depends_on:
      postgres:
        condition: service_healthy
    command: sh -c "npm run migrate"
    restart: "no"

  migrate:
    build:
      context: .
      dockerfile: ./backend/Dockerfile
    container_name: geo-migrate
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/geo_saas
    depends_on:
      postgres:
        condition: service_healthy
    command: sh -c "npm run migrate"
    restart: "no"

  api:
    build:
      context: .
      dockerfile: ./backend/Dockerfile
    container_name: geo-api
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/geo_saas
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=7d
      - REDIS_URL=redis://redis:6379
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost}
      - PORT=3001
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

