services:
  redis:
    image: redis:7-alpine
    container_name: geo_saas_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M
    command: redis-server --maxmemory 96mb --maxmemory-policy allkeys-lru

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: geo_saas_backend
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://neondb_owner:npg_zLW4NjT2vfDo@ep-restless-bread-ajcy9dsh-pooler.c-3.us-east-2.aws.neon.tech/neondb?sslmode=require
      REDIS_URL: redis://redis:6379
      JWT_SECRET: 9cdad47cd84f4fed321d09cc91d0b4cf74b2abced3cd47eef8c49e205cb622ab
      JWT_EXPIRES_IN: 7d
      FRONTEND_URL: http://localhost:5173
      PORT: 3001
    ports:
      - "3001:3001"
    depends_on:
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  worker:
    build:
      context: .
      dockerfile: worker/Dockerfile
    container_name: geo_saas_worker
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://neondb_owner:npg_zLW4NjT2vfDo@ep-restless-bread-ajcy9dsh-pooler.c-3.us-east-2.aws.neon.tech/neondb?sslmode=require
      REDIS_URL: redis://redis:6379
      WORKER_CONCURRENCY: "1"
      MAX_BROWSER_CONTEXTS: "1"
      MEMORY_THRESHOLD_MB: "1200"
      HEALTH_PORT: "8080"
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./chrome-profile:/app/chrome-profile
    deploy:
      resources:
        limits:
          memory: 1200M
        reservations:
          memory: 600M
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: geo_saas_frontend
    environment:
      VITE_API_URL: http://localhost:3001
    ports:
      - "5173:5173"
    depends_on:
      - backend
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

volumes:
  redis_data:

networks:
  default:
    name: geo_saas_network
